name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            libffi-dev libssl-dev autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev \
            cmake ninja-build \
            build-essential ccache

      - name: Install buildozer and tools
        run: |
          pip install --upgrade pip
          pip install setuptools wheel
          pip install cython==0.29.37
          pip install buildozer==1.5.0

      - name: Clone p4a at Python 3.12 era (before Python 3.14)
        run: |
          git clone https://github.com/kivy/python-for-android.git /tmp/p4a
          cd /tmp/p4a
          COMMIT=$(git rev-list -n 1 --before="2025-01-01" master)
          echo "Checking out p4a commit: $COMMIT"
          git checkout $COMMIT
          echo "=== Python version in recipe ==="
          grep -i "version" pythonforandroid/recipes/python3/__init__.py | head -5

      - name: Configure buildozer to use pinned p4a
        run: |
          echo "p4a.source_dir = /tmp/p4a" >> buildozer.spec
          echo "=== buildozer.spec ==="
          cat buildozer.spec

      - name: Build APK
        run: |
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bsmonitor-apk
          path: bin/*.apk
          retention-days: 7

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 3
          if-no-files-found: ignore
